perplexity_substrate_c_novel_findings:
  n_10_sabater_sierra_completely_wrong:
    finding: |
      Two co-authors (J. Sabater [Jordi Sabater-Mir] + C. Sierra [Carles Sierra]) wrongly
      fused into hyphenated surname. Venue WRONG: Artificial Intelligence Review 24(1):33-60,
      NOT "Autonomous Agents and Multi-Agent Systems." MISATTRIBUTION: RepAge (private_image
      /public_reputation dual-channel) is a SEPARATE 2006 JASSS paper (Sabater-Mir, Paolucci
      & Conte), NOT the 2005 review being cited.
    impact: ITEM_156_LOCAL + FRAMEWORK_WIDE (any other "Sabater-Sierra" citations)
    action_applied: |
      Item 156 spec §3.9 corrected to Sabater-Mir, Paolucci & Conte 2006 JASSS for RepAge
      + Sabater & Sierra 2005 AI Review for general trust/reputation survey.
      Framework-wide grep "Sabater-Sierra" scheduled Council #11 Item 158.
  n_11_girvan_newman_2002_modularity_threshold_misattribution:
    finding: |
      Q≥0.3 modularity threshold does NOT appear in Girvan-Newman 2002 (PNAS 99(12):7821-7826);
      threshold originates Newman & Girvan 2004 (Phys Rev E 69:026113).
    impact: ITEM_156_LOCAL (H-group-5 hypothesis anchor)
    action_applied: |
      Item 156 spec H-group-5 anchor corrected to Newman & Girvan 2004 for Q≥0.3.
      Framework-wide grep "Girvan-Newman 2002" for Q≥0.3 scheduled Council #11 Item 158.
  n_12_judge_2002_sample_effect_wrong:
    finding: |
      k=222 correlations from 73 samples (78 studies), NOT k=271 as framework claims.
      Multiple R=.48 → R²≈.23 (23%), not "26%" as framework claims.
      Extraversion .31 / Conscientiousness .28 / Openness .24 DO match.
    impact: FRAMEWORK_WIDE
    action_applied: Framework-wide grep "Judge 2002 k=271" or "26%" scheduled Council #11 Item 158.
  n_13_latane_1981_canonical_04_not_in_primary:
    finding: |
      Latané social-impact exponent primary reports domain-specific values: bystander
      cube-root (0.33), conformity 0.46, stage-fright 0.52. "canonical .4" and "t range
      .25-.5" NOT in primary. Framework's t=0.4 is CALIBRATION-CHOICE not source-supported.
    impact: ITEM_156_LOCAL (group-size Latané modulator anchor)
    action_applied: |
      Item 156 spec group-size modulator re-framed as CALIBRATION-CHOICE within [0.33, 0.52]
      domain-dependent range with per-domain justification.
  n_14_levine_2002_beta_unsupported:
    finding: |
      Levine 2002 primary is qualitative-experimental paper with NO reported β or
      multiplicative modifier. "β ~ .5" and "~20 percentage-point" NOT in paper.
    impact: ITEM_156_LOCAL (β_ingroup in-group modulator anchor)
    action_applied: |
      Item 156 spec β_ingroup=0.5 re-flagged as CALIBRATION-CHOICE (removes Levine 2002
      as quantitative anchor; retains as directional-effect anchor).
  n_15_hollander_1958_beta_likability_fabricated:
    finding: |
      Hollander 1958 defines "Alpha value" (Va = weight of current performance/competence);
      α=competence supported. "Beta = likability" is NOT Hollander's terminology; unsupported
      attribution.
    impact: ITEM_156_LOCAL (F0 leadership_emergence anchor; superseded by roadmap Cluster F2)
    action_applied: |
      Item 156 spec Hollander citation removes "β=likability" attribution; retains α=competence.
      Cluster F2 dominance/prestige dual-axis (Phase 1) replaces Hollander single-axis entirely,
      resolving the fabricated attribution issue at the architecture level.
  n_16_kiecolt_glaser_marital_claims_unsupported:
    finding: |
      "female 1.3x" and "bad marriage worse than none" NOT in primary abstract.
    impact: LOW
    action_applied: |
      Item 156 spec + framework-wide grep "female 1.3x" scheduled Council #11 Item 158;
      no immediate ship blocker.
  n_17_darley_latane_1968_alone_condition_correction:
    finding: |
      Actual alone-condition = 85% (before cutoff), NOT 100% as framework states. Framework
      CONFLATED seizure study (Darley & Latane 1968, JPSP 8(4):377-383) with smoke-filled-
      room study (Latane & Darley 1968, JPSP 10(3):215-221) — different papers.
    impact: LOW-MEDIUM
    action_applied: Item 156 spec correction (85% not 100%) + citation disambiguation of two papers.
  n_18_eisenberger_2003_no_quantitative_stress_constants:
    status: K=3_CONVERGENCE (see §k3_convergences_across_grok_opus_perplexity convergence_4)
  n_19_rapoport_1953_unidentified:
    finding: |
      Author is Anatol Rapoport; specific work cannot be pinned. Two candidates: "Spread of
      information through a population..." Bull Math Biophysics 15:523-546 (most likely) OR
      "Operational Philosophy" Harper 1953.
    impact: LOW
    action_applied: |
      Item 156 spec Rapoport 1953 citation flagged UNVERIFIED with re-cite pending
      identification. Council #11 Item 158 framework-wide clarification.
  n_20_landau_2011_chapter_unverified:
    finding: |
      Landau/Kosloff/Schmeichel 2011 TMT self-regulation chapter — exact chapter title/
      editors/pages/publisher NOT confirmed at primary source.
    impact: MEDIUM (compounds with Klein 2022 + Opus SPECULATIVE-EXTRAPOLATION flag for
      chronic-vs-acute MS distinction; MortalitySalienceState substrate now triply-flagged)
    action_applied: |
