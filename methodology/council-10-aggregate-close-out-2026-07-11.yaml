k3_convergences_across_grok_opus_perplexity:
  convergence_1_klein_2022_tmt_failure:
    grok_position: REJECT-STALE recommended
    opus_position: |
      Confirmed spec §8.1.6 already flags Klein 2022; H-group-11 15pp criterion structurally
      BELOW Rule 27's ≥20% gate independent of replication; agenda re-includes MS in provisional
      subset which spec's own v1 K=5 correctly excludes
    perplexity_position: |
      Klein 2022 primary VERIFIED at Collabra: Psychology 8(1):35271 (21 labs, N=2,281, failed
      replication with original author involvement); Burke 2010 r=.35 "likely inflated by
      publication bias" per Bayesian reanalyses
    consensus_action: |
      Ship Item 156 v1 K=5 subset EXCLUDING MortalitySalienceState per Opus N-5 finding
      (spec's own v1 K=5 = balance + bystander + in-group + ostracism + social-support).
      MS deferred until post-2022 replication yields survives.
    load_bearing_impact: HIGH
  convergence_2_holt_lunstad_extrapolation:
    grok_position: INVALID EXTRAPOLATION; deflate β to 0.2-0.3
    opus_position: |
      Not invalid — standard endpoint-calibrated Cox hazard form is defensible continuous
      extension of dichotomous OR. Real defects: (a) OR overstates HR/RR for common outcomes
      (mortality common in sim); (b) missing per-tick timescale calibration; converges on
      "needs recalibration" but diverges on invalidity
    perplexity_position: |
      All primary values VERIFIED at PLoS Med 7(7):e1000316 (k=148, N=308,849, OR=1.50 CI
      1.42-1.59, structural OR=1.57, functional OR=1.46, multidim OR=1.91 CI 1.63-2.23,
      follow-up 7.5y); BUT: "Converting Holt-Lunstad odds ratios / relative risks into a
      continuous per-tick hazard multiplier is a modeling assumption, not a source-reported quantity"
    divergence_resolution: |
      Perplexity's "modeling assumption not source-reported" corroborates Opus's "extrapolation
      form is defensible but IS an extrapolation." Grok's downward-deflation instinct is CORRECT
      (OR overstates HR for common outcomes) but Grok's stated mechanism (invalidity) is WRONG.
      K=3 quorum synthesis: needs new EMPIRICAL-TRANSLATION flag + deflate β to 0.2-0.3 OR add
      explicit timescale calibration + document endpoint-calibration methodology.
    load_bearing_impact: HIGH
    proposes_new_rule_19_flag_class: EMPIRICAL-TRANSLATION (Opus N-7)
  convergence_3_dunbar_150:
    grok_position: implicit via general concerns
    opus_position: not directly at 150-figure level
    perplexity_position: |
      Lindenfors-Wartel-Lind 2021 Biology Letters 17:20210158 VERIFIED: best estimate 69.2,
      95% CI 3.8-292.0; "no support for a single ~150 limit." PLUS Perplexity NOVEL:
      148/150 human number is MIS-ATTRIBUTED to Dunbar 1992; the figure actually appears in
      Dunbar 1993 (co-evolution paper). Dunbar 1992 has only r²=0.764 regression across 38 genera.
    consensus_action: |
      Model cognitive group-tracking as wide-CI per-Sim parameter (100-250 range with wide
      individual variance) NOT a hard 150 constant. Re-cite Dunbar 1993 for the 148/150 figure,
      not Dunbar 1992.
    load_bearing_impact: MEDIUM
  convergence_4_ostracism_k_zero_anchor:
    grok_position: |
      k_ostracism ≈ 0.5, k_valence ≈ 0.3, k_integrity ≈ 0.2 are pure designer calibration
      with ZERO primary empirical anchor. Williams 2001/2007 + Eisenberger 2003 support
      DIRECTION of effect but NOT magnitudes.
    opus_position: |
      K2-REQUIRED HIGH priority. Do NOT ship Tier 10 with un-corroborated. Sensitivity sweep
      3-value (0.3/0.5/0.7) recommended.
    perplexity_position: |
      Eisenberger 2003 Science 302(5643):290-292 dACC-overlap finding VERIFIED — but explicitly:
      "this neuroimaging dACC-overlap finding provides no quantitative stress constants;
      converting it into a per-tick stress multiplier is not supported by the source."
    consensus_action: |
      K=3 quorum confirms ZERO primary anchor. Retain as CALIBRATION-CHOICE explicitly flagged.
      3-value sensitivity sweep in Non-Inertness Gate harness. Consider RETIRE-STALE if sweep
      shows constants dominate substrate behavior arbitrarily.
    load_bearing_impact: HIGH

